<svg xmlns="http://www.w3.org/2000/svg" width="500" height="520" viewBox="0 0 500 520">

  <!-- Window background -->
  <rect width="500" height="520" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="500" height="40" rx="10" fill="#313244"/>
  <rect y="20" width="500" height="20" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="20" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="20" r="6" fill="#a6e3a1"/>

  <!-- Window title -->
  <text x="250" y="20"
        text-anchor="middle" dominant-baseline="middle"
        font-family="'SF Mono','Fira Code','Roboto Mono',monospace"
        font-size="12" fill="#cdd6f4" opacity="0.5">kk-no — zsh</text>

  <!-- Separator -->
  <line x1="0" y1="40" x2="500" y2="40" stroke="#45475a" stroke-width="1"/>

  <!-- whoami -->
  <text x="20" y="70" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14">
    <tspan fill="#a6e3a1">kk-no@github:~$</tspan><tspan fill="#cdd6f4"> whoami</tspan>
  </text>
  <text x="20" y="92" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">kk-no</text>

  <!-- cat /etc/profile -->
  <text x="20" y="136" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14">
    <tspan fill="#a6e3a1">kk-no@github:~$</tspan><tspan fill="#cdd6f4"> cat /etc/profile</tspan>
  </text>
  <text x="20" y="158" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">Software Engineer</text>

  <!-- tree ~/skills -->
  <text x="20" y="202" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14">
    <tspan fill="#a6e3a1">kk-no@github:~$</tspan><tspan fill="#cdd6f4"> tree ~/skills</tspan>
  </text>

  <!-- tree output -->
  <text x="20" y="224" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">skills/</text>
  <text x="20" y="246" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">├── languages/</text>
  <text x="20" y="268" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">│   ├── go</text>
  <text x="20" y="290" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">│   ├── python</text>
  <text x="20" y="312" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">│   └── swift</text>
  <text x="20" y="334" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">├── infrastructure/</text>
  <text x="20" y="356" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">│   ├── docker</text>
  <text x="20" y="378" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">│   ├── terraform</text>
  <text x="20" y="400" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">│   └── google_cloud</text>
  <text x="20" y="422" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4">└── database/</text>
  <text x="20" y="444" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14" fill="#cdd6f4" xml:space="preserve">   └── mysql</text>

  <!-- Final prompt with cursor -->
  <text x="20" y="488" font-family="'SF Mono','Fira Code','Roboto Mono',monospace" font-size="14"><tspan fill="#a6e3a1">kk-no@github:~$ </tspan><tspan fill="#cdd6f4" textLength="3" lengthAdjust="spacingAndGlyphs">█<animate attributeName="opacity" values="1;1;0;0" dur="1s" keyTimes="0;0.5;0.5;1" repeatCount="indefinite"/></tspan></text>

</svg>
